extension:
  name: query_limiter
  description: Reject queries before physical execution when estimated table scans exceed a configured row budget
  version: 0.1.0
  language: C++
  build: cmake
  license: MIT
  excluded_platforms: "wasm_mvp;wasm_eh;wasm_threads"
  maintainers:
    - dentiny

repo:
  github: dentiny/duckdb-query-limiter
  ref: 410e2418cf7f9d9dccbf2dccb6bb8b22d5df5e14

docs:
  hello_world: |
    SET max_rows_to_scan = 1000000;
    CREATE TABLE limiter_demo AS SELECT i FROM range(100) tbl(i);
    SELECT sum(i) FROM limiter_demo;
  extended_description: |
    Query Limiter is a DuckDB extension that rejects queries before physical execution when DuckDB estimates that table scans would exceed a configured row budget.

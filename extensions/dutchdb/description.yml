extension:
  name: dutchdb
  description: Write SQL queries in Dutch — SELECTEER, VAN, WAARBIJ, and more
  version: 1.4.2026
  language: C++
  build: cmake
  license: MIT
  maintainers:
    - Dtenwolde

repo:
  github: Dtenwolde/dutchdb
  ref: 69720da0927b0f121dd83279920fe67fdbd8a640

docs:
  hello_world: |
    LOAD dutchdb;
    CALL enable_dutch_parser();

    MAAK TABEL eend (id GEHEEL_GETAL, naam TEKST, gewicht KOMMAGETAL);
    TOEVOEGEN AAN eend WAARDEN (1, 'Donald', 1.2), (2, 'Daffy', 1.5);
    SELECTEER * VAN eend WAARBIJ gewicht > 1.3 VOLGORDE PER naam;

  extended_description: >
    DutchDB is a DuckDB extension that lets you write SQL queries in Dutch.
    Load the extension, enable the parser, and query away using fully Dutch keywords.


    Supported features include SELECT (SELECTEER), WHERE (WAARBIJ), FROM (VAN),
    JOIN (SAMENVOEGEN), GROUP BY (GROEP PER), ORDER BY (VOLGORDE PER),
    INSERT (TOEVOEGEN AAN), UPDATE (BIJWERKEN), DELETE (VERWIJDEREN VAN),
    CREATE TABLE (MAAK TABEL), DROP TABLE (GOOI_WEG TABEL), and more.

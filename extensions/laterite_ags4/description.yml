extension:
  name: laterite_ags4
  description: Read AGS4 geotechnical data files as typed, UUID-keyed tables directly from SQL тАФ born-typed columns, deterministic content-addressed keys that join across groups by construction, embedded AGS dictionary, and opt-in validation. Local, http(s):// and s3:// (with httpfs).
  version: 0.6.2
  language: Rust
  build: cargo
  license: MIT
  # wasm is EXCLUDED for now. The value of this extension is the path/remote VFS
  # readers (read_ags / ags_groups / тАж over local, http(s):// and s3://), which
  # need DuckDB's filesystem = the version-exact unstable C API (libduckdb-sys
  # pinned to the 1.5.3 ABI). DuckDB-WASM is on the 1.5.1 ABI, and cargo can't
  # unify two 1.x versions in one manifest тАФ so the wasm build can't link (cf.
  # duckdb/extension-ci-tools#385). Browser SQL-over-AGS is already served by the
  # dedicated `laterite-ags4-wasm` package (parse/read тЖТ Arrow тЖТ duckdb-wasm), so
  # the extension stays native-only. Revisit when DuckDB-WASM reaches 1.5.3.
  # (linux_amd64_musl: untested.)
  excluded_platforms: "wasm_mvp;wasm_eh;wasm_threads;linux_amd64_musl"
  requires_toolchains: "rust"
  maintainers:
    - niko86

repo:
  github: niko86/laterite-duckdb
  # Pin to the release commit SHA once the repo is pushed + tagged (community-
  # extensions pins a SHA, not a branch). Placeholder until then:
  ref: 67049839f5bdb728897f1024a362e692519c9b87

docs:
  hello_world: |
    -- Read a group as a typed table (columns typed from the file's own TYPE row):
    SELECT loca_id, loca_gl
    FROM read_ags('site.ags', 'LOCA')
    WHERE loca_gl > 50.0;

    -- Join across groups on the deterministic keys тАФ no shared state, joins by
    -- construction (every SAMP row's _parent_id equals its LOCA's _id):
    SELECT l.loca_id, s.samp_ref, s.samp_top
    FROM read_ags('site.ags', 'SAMP') s
    JOIN read_ags('site.ags', 'LOCA') l ON s._parent_id = l._id;

    -- Inspect structure + the embedded AGS dictionary:
    SELECT "group", n_rows, parent FROM ags_groups('site.ags') ORDER BY n_rows DESC;
    SELECT child, parent, shared_keys FROM ags_relationships() WHERE parent = 'LOCA';

    -- Opt-in validation (auto-detects the edition from TRAN_AGS):
    SELECT rule, line, "group", severity, "desc" FROM validate_ags('site.ags');

    -- Remote, lazily (with httpfs):
    -- LOAD httpfs;
    -- SELECT loca_id FROM read_ags('s3://bucket/site.ags', 'LOCA');
  extended_description: |
    `laterite_ags4` reads [AGS4](https://www.ags.org.uk/) geotechnical & geoenvironmental
    data files as first-class DuckDB tables тАФ no conversion step, no bundled engine.

    Written in ЁЯжА Rust on DuckDB's C Extension API (zero C++).

    ### What it gives you

    - **Born-typed columns** тАФ each heading is typed from the file's own `TYPE` row
      (`2DP` тЖТ `DOUBLE`, `ID` тЖТ `VARCHAR`, `0DP` тЖТ `BIGINT`, `YN` тЖТ `BOOLEAN`, тАж).
    - **Deterministic content-addressed keys** тАФ every row carries `_id` and
      `_parent_id` (UUIDv8 of the row's spec key-chain). `child._parent_id == parent._id`
      **by construction**, so groups join across independent `read_ags(...)` calls with
      no shared state.
    - **Self-describing metadata** тАФ `ags_groups`, `ags_headings`, `ags_dictionary`,
      `ags_relationships` expose the file's structure and the embedded AGS dictionary.
    - **Opt-in validation** тАФ `validate_ags(path[, dict_version := '4.2'])` runs a clean-room
      AGS4 rule check (error-only by default; `warnings := true` / `fyi := true` add the lower
      tiers); never a gate on reads.
    - **Persistence** тАФ `load_ags_script(path)` emits CREATE-TABLE DDL for an indexed,
      repeat-/remote-query store.
    - **Local or remote** тАФ reads go through DuckDB's virtual filesystem, so local paths,
      `http(s)://` and `s3://` (with `LOAD httpfs`) all work on one code path.

    ### Functions

    | function | returns |
    |---|---|
    | `read_ags(path, group)` | one group as a typed table тАФ `_id`, `_parent_id`, then one column per heading (typed from the file's `TYPE` row). Reads local / `http(s)://` / `s3://`. |
    | `read_ags_text(content, group)` | the same typed table, from an **inline AGS4 string** (no filesystem). |
    | `ags_groups(path)` | `(group, n_rows, n_headings, parent)` тАФ the file's group list. |
    | `ags_headings(path)` | `(group, heading, unit, ags_type, sql_type, status, is_key, ordinal)` тАФ the per-heading schema, enriched with the dictionary's KEY status. |
    | `ags_dictionary()` | the embedded standard AGS dictionary as a table (`group`, `heading`, `status`, `ags_type`, `unit`, `description`, тАж). |
    | `ags_relationships()` | `(child, parent, shared_keys)` тАФ the spec parentтЖТchild graph that `_parent_id` follows. |
    | `validate_ags(path[, dict_version := '4.2'][, warnings := true][, fyi := true])` | `(rule, line, group, severity, desc)` тАФ a clean-room AGS4 rule check; the edition auto-detects from `TRAN_AGS` unless forced, and only `error`-severity findings show unless the `warnings` / `fyi` tiers are opted in. |
    | `certify_ags(path[, dict_version := '4.2'])` | validate, then mint a sibling `.ags.idx` certificate; returns a one-row status (`certified`, `groups`/`errors`/`warnings`/`fyi` counts, `dict_version`, `message`). |
    | `validate_ags_text(content[, dict_version := '4.2'][, warnings := true][, fyi := true])` | the same rule check as `validate_ags`, over an **inline AGS4 string** (no filesystem) тАФ the twin of `read_ags_text`. |
    | `certify_ags_text(content[, dict_version := '4.2'])` | validate an inline AGS4 string and, when clean, return the `.ags.idx` certificate **JSON in a `cert` column** (nothing written to disk) тАФ the in-memory analog of `certify_ags`. |
    | `load_ags_script(path)` | `(seq, stmt)` тАФ CREATE-TABLE DDL to materialise every group into an indexed, repeat-/remote-queryable store. |

    Readers stream lazily (тЙИ2048-row vector chunks); a non-conforming numeric cell becomes
    `NULL`, never an error (the born-typed behaviour). Optional arguments are **named**
    (`dict_version := '4.2'`, `warnings := true`), the rest positional. The path verbs
    take an `encoding` named param (e.g. `encoding := 'windows-1252'`) for non-UTF-8
    sources; the `_text` variants are UTF-8 (their input is already a `VARCHAR`). There
    is no repair surface тАФ mutation stays in the `lat-check` CLI / the `laterite` library.

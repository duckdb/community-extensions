extension:
  name: pfc
  description: Read PFC-JSONL compressed log files directly in DuckDB with block-level timestamp filtering
  version: 0.1.0
  language: C++
  build: cmake
  license: MIT
  maintainers:
    - ImpossibleForge

repo:
  github: ImpossibleForge/pfc-duckdb
  ref: 8b228c10ea644aa7c7998a9b4ed0284a9d33e2ca

docs:
  hello_world: |
    INSTALL pfc FROM community;
    LOAD pfc;
    LOAD json;

    -- Read a compressed PFC-JSONL log file
    SELECT
        line->>'$.level'   AS level,
        line->>'$.message' AS message
    FROM read_pfc_jsonl('/path/to/events.pfc')
    LIMIT 10;

    -- Block-level timestamp filter: only decompress relevant blocks
    SELECT count(*) FROM read_pfc_jsonl(
        '/path/to/events.pfc',
        ts_from = epoch(TIMESTAMPTZ '2026-01-01 00:00:00+00'),
        ts_to   = epoch(TIMESTAMPTZ '2026-01-02 00:00:00+00')
    );
  extended_description: |
    The **pfc** extension lets you query [PFC-JSONL](https://github.com/ImpossibleForge/pfc-jsonl)
    compressed log files directly in DuckDB — no decompression step, no intermediate files.

    ## Key Features

    - **Block-level timestamp filtering** via `ts_from` / `ts_to` parameters.
      Entire blocks outside the requested time window are skipped before decompression.
      A 1-hour query on a 30-day file with hourly blocks reads ~1/720 of the data.

    - **Community Mode**: The PFC-JSONL binary includes a built-in free tier —
      5 GB/day without any license key. Usage is tracked locally, no phone-home.

    - **Simple API**: one column `line VARCHAR` per row (raw JSON string).
      Combine with DuckDB's built-in `json` extension for field extraction and analytics.

    ## Requirements

    The extension calls the [PFC-JSONL binary](https://github.com/ImpossibleForge/pfc-jsonl)
    for block decompression. Install once:

    ```bash
    curl -L https://github.com/ImpossibleForge/pfc-jsonl/releases/latest/download/pfc_jsonl-linux-x64 \
         -o /usr/local/bin/pfc_jsonl && chmod +x /usr/local/bin/pfc_jsonl
    ```

    The binary is expected at `/usr/local/bin/pfc_jsonl`.
    Override with the `PFC_JSONL_BINARY` environment variable.

    ## File Format

    Each `.pfc` file must have a companion `.pfc.bidx` binary block index,
    written automatically by PFC-JSONL v3.4+:

    ```bash
    pfc_jsonl compress input.jsonl output.pfc
    # Produces: output.pfc + output.pfc.bidx
    ```

    ## Analytics Example

    ```sql
    LOAD pfc;
    LOAD json;

    -- Error rate per hour for a specific day
    SELECT
        strftime(to_timestamp((line->>'$.ts')::BIGINT), '%H:00') AS hour,
        count(*) FILTER (WHERE line->>'$.level' = 'ERROR')       AS errors,
        count(*)                                                  AS total
    FROM read_pfc_jsonl(
        '/var/log/api.pfc',
        ts_from = epoch(TIMESTAMPTZ '2026-03-15 00:00:00+00'),
        ts_to   = epoch(TIMESTAMPTZ '2026-03-16 00:00:00+00')
    )
    GROUP BY hour
    ORDER BY hour;
    ```

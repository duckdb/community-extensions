    в”Ӯ   name   в”Ӯ
    в”Ӯ varchar  в”Ӯ
    в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө
    в”Ӯ Monopoly в”Ӯ
    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
    -- Execute arbitrary DDL via adbc_execute
    D CALL adbc_execute('profile://mydb', 'DROP TABLE public.game_inventors');
    в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
    в”Ӯ Success в”Ӯ
    в”Ӯ boolean в”Ӯ
    в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө

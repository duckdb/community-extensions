    в”Ӯ     1 в”Ӯ Monopoly в”Ӯ Elizabeth Magie     в”Ӯ  1903 в”Ӯ
    в”Ӯ     2 в”Ӯ Scrabble в”Ӯ Alfred Mosher Butts в”Ӯ  1938 в”Ӯ
    в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
    -- INSERT a new row into the remote database
    D INSERT INTO games (SELECT 6, 'Battleship', 'Clifford Von Wickler', 1931, 7, 2, 2);
    -- CREATE TABLE AS SELECT (CTAS) on the remote database
    D CREATE TABLE game_inventors(id, inventor) AS (SELECT id, inventor FROM games);
    -- Directly query with read_adbc for explicit predicate pushdown
    D SELECT * FROM read_adbc('profile://mydb', 'SELECT name FROM games WHERE year = 1903');

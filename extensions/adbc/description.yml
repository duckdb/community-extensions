    -- Clear local metadata cache after remote schema changes
    D CALL adbc_clear_cache();
  extended_description: |
    Use DuckDB (v1.4.5+ or v1.5.4+) to query Snowflake, Databricks, BigQuery, PostgreSQL, MySQL, or any other system with an ADBC driver.
    ADBC (Arrow Database Connectivity) is a universal data-access API built on Apache Arrow, an efficient, columnar data format that almost every data system supports natively.
    By building on Arrow, ADBC enables:
    1. **Lightning-fast (zero-copy) data transfer** between column-oriented analytical databases, bypassing the slow column-to-row and row-to-column conversions typical of legacy row-based APIs like ODBC or JDBC.
    2. **Seamless interoperability** with a large and growing ecosystem of Arrow-compatible systems.
    ### Key Capabilities
    * **Full SQL Interoperability:** Supports catalog lookups, `SELECT`, `INSERT`, `COPY`, and `CREATE TABLE AS` (`CTAS`) statements directly on attached databases.
    * **Custom Quoting Flavors:** Includes a `DELIMITER` option (e.g., `DELIMITER '[]'`) to cleanly map target engine quote rules like SQL Server.
    * **Performance Tuning Knobs:** Built-in connection pooling (`adbc_connection_pool_size`) and streaming bulk ingest (`adbc_insert_buffer_size`).
    ### Known Limitations
    * Operates exclusively in **Autocommit Mode**.
    * Predicate and projection pushdowns are not automatically performed for attached tables; use direct `read_adbc()` queries to push projections and predicates to remote ADBC databases.
    * Concurrent ADBC operations within a single process are not supported. Mixing ADBC reads and writes in the same SQL statement is also restricted by default unless explicitly permitted via `adbc_mix_reads_writes`.

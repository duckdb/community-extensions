extension:
  name: adbc
  description: Connects DuckDB to Snowflake, Databricks, BigQuery, PostgreSQL, MySQL, and more using Arrow Database Connectivity (ADBC) drivers.
  version: 0.0.1
  language: C++
  build: cmake
  license: Apache-2.0
  maintainers:
    - columnar-tech
  repo:
    github: columnar-tech/duckdb-adbc-client
    andium: v0.0.1-duckdb1.4.5
    ref: v0.0.1-duckdb1.5.4
  docs:
  hello_world: |
    -- Install and load the ADBC extension
    INSTALL adbc FROM 'https://columnar-tech.github.io/duckdb-adbc-client';
    LOAD adbc;
    -- Create a persistent connection via ATTACH
    D ATTACH 'profile://mydb' AS mydb (TYPE adbc);
    D USE mydb.public;
    -- Inspect available tables
    D SHOW ALL TABLES;

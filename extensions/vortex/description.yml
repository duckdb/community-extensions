extension:
  name: vortex
  description: Provides write and scan function for vortex files
  version: 0.0.1
  language: C++
  build: cmake
  license: Apache-2.0
  maintainers:
    - joseph-isaacs
    - 0ax1
  excluded_platforms: "wasm_mvp;wasm_eh;wasm_threads;windows_amd64_rtools;windows_amd64_mingw;windows_amd64"
  requires_toolchains: "rust"

repo:
  github: spiraldb/duckdb-vortex
  ref: 094a43b4955c4c1a578ae63f3680a965f80a1f89


docs:
  hello_world: |
    write a vortex file
    `COPY (SELECT * from generate_series(0, 4)) TO 'FILENAME.vortex' (FORMAT VORTEX);`

    scan a vortex file
    `select * from read_vortex('...');`

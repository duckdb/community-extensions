extension:
  name: vortex
  description: Provides write and scan function for vortex files
  version: 0.0.1
  language: C++
  build: cmake
  license: Apache-2.0
  maintainers:
    - joseph-isaacs
    - 0ax1
  excluded_platforms: "wasm_mvp;wasm_eh;wasm_threads"
  requires_toolchains: "rust"

repo:
  github: spiraldb/vortex
  ref: 92b7229e88a882225b450d131281deec8bf7ac14


docs:
  write: |
    COPY (SELECT * from generate_series(0, 4)) TO 'FILENAME.vortex' (FORMAT VORTEX)

  scan: |
    select * from read_vortex('...');

name: Community Extension with DuckDB on Andium
on:
  pull_request:
    paths-ignore:
      - '**'
      - '!scripts/build.py'
      - '!.github/workflows/build_andium.yml'
      - '!extensions/*/description.yml'
  push:
    paths-ignore:
      - '**'
      - '!scripts/build.py'
      - '!.github/workflows/build_next.yml'
      - '!extensions/*/description.yml'

jobs:
  test_against_latest:
    uses: ./.github/workflows/build.yml 
    with:
      duckdb_version: 'v1.4.5'
      ci_tools_version: 'v1.4-andium'
      deploy: 'true'
